<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs finden – SchülerMatch</title>
<meta name="description" content="Aktuelle Minijobs für Schüler: Nachhilfe, Verkauf, Babysitten und mehr. Filtere nach Ort, Alter, Lohn und Kategorie – kostenlos bewerben.">
<meta property="og:title" content="Jobs finden – SchülerMatch">
<meta property="og:description" content="Aktuelle Minijobs für Schüler – jugendschutzgeprüft und kostenlos.">
<meta property="og:type" content="website">
<meta property="og:locale" content="de_DE">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300c896'/%3E%3Cstop offset='1' stop-color='%232b2f8f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-weight='700' font-size='28' fill='white' text-anchor='middle'%3ESM%3C/text%3E%3C/svg%3E">
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links">
    <a href="jobs.html">Jobs</a>
    <a href="index.html#schueler">Für Schüler</a>
    <a href="index.html#firmen">Für Firmen</a>
  </div>
  <a href="login.html" class="btn btn-dark">Login</a>
  <button class="nav-toggle" aria-label="Menü öffnen" aria-expanded="false"><span></span><span></span><span></span></button>
</nav>
<script src="js/nav.js"></script>

<main class="jobs-page">
  <div class="jobs-header">
    <h1>Minijobs für Schüler</h1>
    <p style="color:var(--ink-soft);">Alle Jobs sind jugendschutzgeprüft und kostenlos für Schüler.</p>
  </div>

  <div class="search-hero">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.3-4.3" stroke-linecap="round"/></svg>
    <input type="text" id="filter-suche" placeholder="Welchen Job suchst du? z.B. Nachhilfe, Eisverkauf...">
  </div>

  <div class="pill-row" id="kategorie-pills">
    <button type="button" class="pill active" data-kat="">Alle</button>
    <button type="button" class="pill" data-kat="Verkauf">Verkauf</button>
    <button type="button" class="pill" data-kat="Nachhilfe">Nachhilfe</button>
    <button type="button" class="pill" data-kat="Gastronomie">Gastronomie</button>
    <button type="button" class="pill" data-kat="Lieferung & Kurier">Lieferung & Kurier</button>
    <button type="button" class="pill" data-kat="Babysitten">Babysitten</button>
    <button type="button" class="pill" data-kat="Haushalt & Garten">Haushalt & Garten</button>
    <button type="button" class="pill" data-kat="Büro & Organisation">Büro & Organisation</button>
    <button type="button" class="pill" data-kat="Sonstiges">Sonstiges</button>
  </div>

  <div class="filter-row">
    <input type="text" id="filter-ort" placeholder="Stadt (z.B. München)">
    <select id="filter-alter">
      <option value="">Alle Altersgruppen</option>
      <option value="10">ab 10</option><option value="11">ab 11</option><option value="12">ab 12</option>
      <option value="13">ab 13</option><option value="14">ab 14</option><option value="15">ab 15</option>
      <option value="16">ab 16</option><option value="17">ab 17</option><option value="18">ab 18</option>
      <option value="19">ab 19</option><option value="20">ab 20</option>
    </select>
    <select id="filter-gehalt">
      <option value="">Jeder Lohn</option>
      <option value="8">ab 8 €/Std</option>
      <option value="10">ab 10 €/Std</option>
      <option value="12">ab 12 €/Std</option>
      <option value="14">ab 14 €/Std</option>
      <option value="16">ab 16 €/Std</option>
    </select>
    <select id="filter-arbeitszeit">
      <option value="">Jede Arbeitszeit</option>
      <option>Wochenende</option>
      <option>Nachmittags</option>
      <option>Abends</option>
      <option>Ferienjob</option>
      <option>Flexibel</option>
    </select>
    <select id="sortierung">
      <option value="neueste">Neueste zuerst</option>
      <option value="lohn">Höchster Lohn</option>
      <option value="alter">Niedrigstes Mindestalter</option>
    </select>
  </div>

  <p class="jobs-count mono" id="jobs-count"></p>

  <div class="jobs-grid" id="jobs-grid">
    <div class="skeleton-card"></div><div class="skeleton-card"></div><div class="skeleton-card"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="logo"><span class="logo-mark">SM</span> SchülerMatch</div>
    <div class="footer-links">
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
      <a href="jugendarbeitsschutz.html">Jugendarbeitsschutz</a>
      <a href="mailto:sanadoda009@gmail.com">Kontakt</a>
    </div>
  </div>
  <div class="footer-bottom wrap">© 2026 SchülerMatch</div>
</footer>

<div class="modal-overlay" id="job-detail-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="detail-titel">Job</h3>
      <button type="button" class="modal-close" id="detail-close" aria-label="Schließen">✕</button>
    </div>
    <div id="detail-body"></div>
    <a href="register.html?rolle=schueler" class="btn btn-green btn-full" style="margin-top:20px;">Kostenlos registrieren & bewerben</a>
  </div>
</div>

<script type="module" src="js/jobs.js"></script>

</body>
</html>
