<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PDF-Test</title>
<style>
  body { margin: 0; background: #666; font-family: sans-serif; text-align: center; }
  #status { color: #fff; padding: 6px 10px; font-size: 13px; text-align: left; }
  canvas { background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.4); margin: 8px auto; display: block; max-width: 96vw; height: auto; }
</style>
</head>
<body>
<div id="status">erzeuge PDF…</div>
<div id="seiten"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module">
import { erzeugeLebenslaufPdf } from './js/pdf.js'

const p = new URLSearchParams(location.search)
const daten = {
  name: 'Lena Beispiel',
  alter_jahre: 15,
  ort: 'München',
  email: 'lena.beispiel@mail.de',
  schule: 'Gymnasium Musterstadt',
  klasse: '9. Klasse',
  foto_url: null,
  cv_design: { layout: p.get('layout') || 'klassisch', farbe: p.get('farbe') || 'gruen' },
  bloecke: [
    { typ: 'text', titel: 'Über mich', inhalt: 'Ich bin ein offener und zuverlässiger Mensch und suche meinen ersten Nebenjob. Neue Aufgaben lerne ich schnell, und wenn ich etwas zusage, halte ich es auch.' },
    { typ: 'sprachen', titel: 'Sprachen', sprachen: [
      { name: 'Deutsch', niveau: 'Muttersprache' },
      { name: 'Englisch', niveau: 'B1' },
      { name: 'Französisch', niveau: 'A2' } ] },
    { typ: 'skillbar', titel: 'Fähigkeiten', skills: [
      { name: 'Zuverlässigkeit', wert: 90 },
      { name: 'Teamarbeit', wert: 75 },
      { name: 'Kreativität', wert: 65 } ] },
    { typ: 'skills', titel: 'Interessen', tags: 'Fußball, Zeichnen, Backen, Lesen' },
    { typ: 'text', titel: 'Ausbildung', inhalt: 'Gymnasium Musterstadt, 9. Klasse\nLieblingsfächer: Mathe und Kunst · Notenschnitt 2,1' },
    { typ: 'text', titel: 'Erfahrung', inhalt: 'Schülerpraktikum Stadtbücherei München (1 Woche, März 2026): Bücher einsortiert, Ausleihe unterstützt, Lesestunde für Kinder mitgestaltet.\nRegelmäßiges Babysitten für zwei Nachbarskinder (seit 2025), inklusive Abholung vom Kindergarten.\nJugendtrainer-Assistenz beim FC Musterstadt: Betreuung der F-Jugend beim Training.' },
    { typ: 'text', titel: 'Verfügbarkeit', inhalt: 'Mo–Fr ab 15 Uhr, am Wochenende flexibel, in den Ferien ganztags.' }
  ]
}

// ?lang=1 -> Seitenumbruch-Test: sehr viel Inhalt erzwingt Seite 2
if (p.get('lang')) {
  for (let i = 1; i <= 4; i++) {
    daten.bloecke.push({ typ: 'text', titel: 'Projekt ' + i, inhalt: ('Ausführliche Beschreibung des Projekts Nummer ' + i + '. ').repeat(14) })
  }
}

try {
  const doc = await erzeugeLebenslaufPdf(daten)
  const bytes = doc.output('arraybuffer')

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
  const pdf = await pdfjsLib.getDocument({ data: bytes }).promise
  for (let n = 1; n <= pdf.numPages; n++) {
    const page = await pdf.getPage(n)
    const vp = page.getViewport({ scale: 1.6 })
    const canvas = document.createElement('canvas')
    canvas.width = vp.width; canvas.height = vp.height
    document.getElementById('seiten').appendChild(canvas)
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
  }
  document.getElementById('status').textContent =
    `OK – Layout: ${daten.cv_design.layout}, Farbe: ${daten.cv_design.farbe}, Seiten: ${pdf.numPages}`
} catch (e) {
  document.getElementById('status').textContent = 'FEHLER: ' + e.message
  console.error(e)
}
</script>
</body>
</html>
