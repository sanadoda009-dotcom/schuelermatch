<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firmen-Dashboard – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/gate.js"></script>
<link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>

<nav>
  <button class="hamburger-btn" id="sidebar-toggle" aria-label="Menü öffnen">☰</button>
  <a href="index.html" class="logo"><img src="assets/logo.png" alt="SchülerMatch" class="logo-img"></a>
  <div class="nav-links">
    <span id="user-name" class="mono"></span>
  </div>
  <div class="glocke-wrap">
    <button class="glocke-btn" id="glocke-btn" aria-label="Benachrichtigungen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 01-3.4 0" stroke-linecap="round"/></svg>
      <span class="glocke-badge" id="glocke-badge"></span>
    </button>
    <div class="glocke-dropdown" id="glocke-dropdown"></div>
  </div>
  <button id="logout-btn" class="btn btn-outline">Logout</button>
</nav>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-user">
    <div class="cv-photo-preview" id="sidebar-avatar"></div>
    <div>
      <b id="sidebar-name">Firma</b>
      <span>Arbeitgeber</span>
    </div>
  </div>
  <div class="sidebar-label">Verwaltung</div>
  <button class="sidebar-item active" data-view="jobs">
    <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round"/></svg>
    Jobs & Bewerber<span class="sidebar-badge" id="badge-bewerbungen"></span>
  </button>
  <button class="sidebar-item" data-view="profil">
    <svg viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13M3 21h18M9 21v-6h6v6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Firmenprofil
  </button>
</aside>

<main class="jobs-page">

  <!-- JOBS -->
  <div class="dashboard-view active" id="view-jobs">
    <div class="jobs-header">
      <h1>Job posten</h1>
      <p style="color:var(--ink-soft);">Kostenlos, in wenigen Minuten online.</p>
      <div class="stats-row" id="stats-row"></div>
    </div>

    <div class="post-job-box">
      <p class="mono" style="font-size:0.72rem; color:var(--ink-soft); margin:0 0 8px;">VORLAGE WÄHLEN (füllt das Formular vor)</p>
      <div class="cv-templates" style="margin-bottom:18px;">
        <button type="button" class="cv-template-chip" data-jobvorlage="eisverkauf">🍦 Eisverkauf</button>
        <button type="button" class="cv-template-chip" data-jobvorlage="nachhilfe">📚 Nachhilfe</button>
        <button type="button" class="cv-template-chip" data-jobvorlage="babysitten">🧸 Babysitten</button>
        <button type="button" class="cv-template-chip" data-jobvorlage="garten">🌿 Garten & Haushalt</button>
        <button type="button" class="cv-template-chip" data-jobvorlage="regale">🛒 Regale & Verkauf</button>
        <button type="button" class="cv-template-chip" data-jobvorlage="zeitung">📰 Zeitungen austragen</button>
      </div>
      <form id="job-form">
        <div class="form-group">
          <label for="job-titel">Job-Titel</label>
          <input type="text" id="job-titel" placeholder="z.B. Eisverkäufer/in (Sa/So)" required>
        </div>
        <div class="form-group">
          <label for="job-beschreibung">Beschreibung</label>
          <input type="text" id="job-beschreibung" placeholder="Kurze Beschreibung der Aufgabe">
        </div>
        <div class="form-group">
          <label for="job-kategorie">Kategorie</label>
          <select id="job-kategorie">
            <option value="">Bitte wählen</option>
            <option>Verkauf</option>
            <option>Nachhilfe</option>
            <option>Gastronomie</option>
            <option>Lieferung & Kurier</option>
            <option>Babysitten</option>
            <option>Haushalt & Garten</option>
            <option>Büro & Organisation</option>
            <option>Sonstiges</option>
          </select>
        </div>
        <div class="form-group">
          <label for="job-ort">Ort</label>
          <input type="text" id="job-ort" placeholder="z.B. München" required>
        </div>
        <div class="form-group">
          <label for="job-lohn">Stundenlohn (€)</label>
          <input type="number" id="job-lohn" placeholder="z.B. 12" step="0.5">
        </div>
        <div class="form-group">
          <label for="job-mindestalter">Mindestalter</label>
          <select id="job-mindestalter">
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15" selected>15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
          </select>
        </div>
        <div class="form-group">
          <label for="job-arbeitszeit">Arbeitszeit</label>
          <select id="job-arbeitszeit">
            <option value="">Bitte wählen</option>
            <option>Wochenende</option>
            <option>Nachmittags</option>
            <option>Abends</option>
            <option>Ferienjob</option>
            <option>Flexibel</option>
          </select>
        </div>
        <div class="form-group">
          <label for="job-verfuegbarkeit">Verfügbarkeit (Details)</label>
          <input type="text" id="job-verfuegbarkeit" placeholder="z.B. Sa & So, 10–16 Uhr">
        </div>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-green">Job posten</button>
          <button type="button" id="cancel-edit-btn" class="btn btn-outline" style="display:none;">Abbrechen</button>
        </div>
      </form>
    </div>

    <div class="jobs-header" style="margin-top:56px;">
      <h1 style="font-size:1.5rem;">Deine Jobs</h1>
    </div>
    <div class="pill-row" id="bewerber-filter" style="margin-bottom:18px;">
      <span class="mono" style="font-size:0.72rem; color:var(--ink-soft); align-self:center; margin-right:4px;">BEWERBER:</span>
      <button type="button" class="pill active" data-bf="">Alle</button>
      <button type="button" class="pill" data-bf="ausstehend">🕐 Ausstehend</button>
      <button type="button" class="pill" data-bf="angenommen">✓ Angenommen</button>
      <button type="button" class="pill" data-bf="abgelehnt">Abgelehnt</button>
    </div>
    <div class="jobs-grid" id="meine-jobs">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>

  <!-- FIRMENPROFIL -->
  <div class="dashboard-view" id="view-profil">
    <div class="jobs-header">
      <h1 style="font-size:1.6rem;">Firmenprofil</h1>
    </div>
    <div class="post-job-box">
      <form id="profile-form">
        <div class="form-group">
          <label for="profile-name">Firmenname</label>
          <input type="text" id="profile-name" required>
        </div>
        <div class="form-group">
          <label for="profile-ort">Standort</label>
          <input type="text" id="profile-ort">
        </div>
        <button type="submit" class="btn btn-green">Speichern</button>
      </form>
    </div>
  </div>

</main>

<div class="modal-overlay" id="chat-overlay">
  <div class="modal-box" style="padding:0; max-width:560px;">
    <div class="modal-header" style="padding:18px 22px;">
      <h3 id="chat-name">Chat</h3>
      <button type="button" class="modal-close" id="chat-close" aria-label="Schließen">✕</button>
    </div>
    <div id="firma-chat-inner"></div>
  </div>
</div>

<script src="js/nav.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="js/dashboard-firma.js"></script>
</body>
</html>
