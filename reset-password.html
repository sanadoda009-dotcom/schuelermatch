<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neues Passwort – SchülerMatch</title>
<meta name="description" content="Neues Passwort für dein SchülerMatch-Konto festlegen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/gate.js"></script>
<link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><img src="assets/logo.png" alt="SchülerMatch" class="logo-img"></a>
  <div class="nav-links"></div>
</nav>

<main class="auth-main">
  <div class="auth-box">
    <h2>Neues Passwort festlegen</h2>
    <p class="sub">Wähle ein neues Passwort für deinen Account.</p>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">Neues Passwort</label>
        <input type="password" id="password" placeholder="Min. 8 Zeichen" required minlength="8">
      </div>
      <button type="submit" class="btn btn-green btn-full">Passwort speichern</button>
    </form>
  </div>
</main>

<script type="module" src="js/reset-password.js"></script>
</body>
</html>
