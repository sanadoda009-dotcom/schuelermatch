<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Dashboard – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links">
    <span id="user-name" class="mono"></span>
  </div>
  <button id="logout-btn" class="btn btn-outline">Logout</button>
</nav>
<script src="js/nav.js"></script>

<main class="jobs-page">
  <div class="jobs-header">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <div>
        <h1>Deine Matches</h1>
        <p style="color:var(--ink-soft);">Jobs die zu deinem Alter passen.</p>
      </div>
      <button id="toggle-profile-btn" class="btn btn-outline">Profil bearbeiten</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <div class="post-job-box" id="profile-box" style="display:none; margin-bottom:40px;">
    <form id="profile-form">
      <div class="form-group">
        <label for="profile-name">Vorname</label>
        <input type="text" id="profile-name" required>
      </div>
      <div class="form-group">
        <label for="profile-alter">Alter</label>
        <select id="profile-alter">
          <option value="13">13</option><option value="14">14</option><option value="15">15</option>
          <option value="16">16</option><option value="17">17</option>
        </select>
      </div>
      <div class="form-group">
        <label for="profile-ort">Wohnort / PLZ</label>
        <input type="text" id="profile-ort">
      </div>
      <button type="submit" class="btn btn-green">Speichern</button>
    </form>
  </div>

  <div class="jobs-grid" id="jobs-grid">
    <p>Lade Jobs...</p>
  </div>
</main>

<script type="module" src="js/dashboard-schueler.js"></script>
</body>
</html>
