<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrieren – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/gate.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300c896'/%3E%3Cstop offset='1' stop-color='%232b2f8f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-weight='700' font-size='28' fill='white' text-anchor='middle'%3ESM%3C/text%3E%3C/svg%3E">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links"></div>
  <a href="login.html" class="btn btn-outline">Login</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Account erstellen</h2>
    <p class="sub">Kostenlos – dauert 2 Minuten.</p>

    <div class="role-tabs">
      <div class="role-tab active" id="tab-schueler" onclick="setRole('schueler')">Ich bin Schüler</div>
      <div class="role-tab" id="tab-firma" onclick="setRole('firma')">Ich bin Arbeitgeber</div>
    </div>

    <form id="register-form" data-role="schueler" novalidate>
      <div class="form-group">
        <label for="name">Vorname</label>
        <input type="text" id="name" placeholder="Dein Vorname" required>
      </div>

      <!-- Nur für Schüler -->
      <div id="schueler-fields">
        <div class="form-group">
          <label for="alter">Alter</label>
          <select id="alter" onchange="toggleEinwilligung()">
            <option value="">Bitte wählen</option>
            <option>10</option><option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
            <option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
          </select>
        </div>
        <div class="form-group">
          <label for="ort">Wohnort / PLZ</label>
          <input type="text" id="ort" placeholder="z.B. München oder 80331">
        </div>
        <div class="form-group consent-group" id="consent-group">
          <label class="consent-label">
            <input type="checkbox" id="eltern-einwilligung">
            Ich habe die Erlaubnis meiner Eltern bzw. Erziehungsberechtigten, mich hier zu registrieren.
            <span class="mono" style="display:block; margin-top:4px; opacity:0.7;">(Pflicht laut Art. 8 DSGVO für Nutzer unter 16 Jahren)</span>
          </label>
        </div>
      </div>

      <!-- Nur für Firmen -->
      <div id="firma-fields" style="display:none;">
        <div class="form-group">
          <label for="firma-name">Firmenname</label>
          <input type="text" id="firma-name" placeholder="Deine Firma GmbH">
        </div>
        <div class="form-group">
          <label for="firma-ort">Standort</label>
          <input type="text" id="firma-ort" placeholder="z.B. Berlin">
        </div>
      </div>

      <div class="form-group">
        <label for="reg-email">E-Mail</label>
        <input type="email" id="reg-email" placeholder="deine@email.de" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Passwort</label>
        <input type="password" id="reg-password" placeholder="Min. 8 Zeichen" required minlength="8">
      </div>

      <button type="submit" class="btn btn-green btn-full" style="margin-top:8px;">Account erstellen</button>
    </form>

    <p class="auth-switch">Bereits registriert? <a href="login.html">Einloggen</a></p>
  </div>
</main>

<p style="text-align:center; padding-bottom:24px; font-size:0.8rem; color:var(--ink-soft);">
  <a href="impressum.html" style="color:inherit;">Impressum</a> · <a href="datenschutz.html" style="color:inherit;">Datenschutz</a>
</p>

<script type="module" src="js/auth.js"></script>
<script>
  function setRole(role) {
    document.getElementById('tab-schueler').classList.toggle('active', role === 'schueler');
    document.getElementById('tab-firma').classList.toggle('active', role === 'firma');
    document.getElementById('schueler-fields').style.display = role === 'schueler' ? 'block' : 'none';
    document.getElementById('firma-fields').style.display = role === 'firma' ? 'block' : 'none';
    document.getElementById('register-form').dataset.role = role;
  }

  // URL-Parameter auslesen: register.html?rolle=firma
  const params = new URLSearchParams(window.location.search);
  if (params.get('rolle') === 'firma') setRole('firma');

  function toggleEinwilligung() {
    const alter = parseInt(document.getElementById('alter').value);
    const zeigen = !alter || alter < 16;
    document.getElementById('consent-group').style.display = zeigen ? 'block' : 'none';
  }
</script>
</body>
</html>
