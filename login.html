<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – SchülerMatch</title>
<meta name="description" content="Melde dich bei SchülerMatch an – der kostenlosen Plattform für Schülerjobs in deiner Nähe.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/monitoring.js"></script>
<script src="js/gate.js"></script>
<link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><img src="assets/logo.png" alt="SchülerMatch" class="logo-img"></a>
  <div class="nav-links"></div>
  <a href="register.html" class="btn btn-outline">Registrieren</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Willkommen zurück</h2>
    <p class="sub">Logge dich in deinen Account ein.</p>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('schueler', this)">Ich bin Schüler</div>
      <div class="role-tab" onclick="setRole('firma', this)">Ich bin Arbeitgeber</div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green btn-full" style="margin-top:8px;">Einloggen</button>
    </form>

    <p class="auth-switch"><a href="forgot-password.html">Passwort vergessen?</a></p>
    <p class="auth-switch">Noch kein Account? <a href="register.html">Jetzt registrieren</a></p>
  </div>
</main>

<p style="text-align:center; padding-bottom:24px; font-size:0.8rem; color:var(--ink-soft);">
  <a href="impressum.html" style="color:inherit;">Impressum</a> · <a href="datenschutz.html" style="color:inherit;">Datenschutz</a>
</p>

<script type="module" src="js/auth.js"></script>
<script>
  function setRole(role, el) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('login-form').dataset.role = role;
  }
</script>
</body>
</html>
