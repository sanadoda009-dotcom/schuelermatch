<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links"></div>
  <a href="register.html" class="btn btn-outline">Registrieren</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Willkommen zurück</h2>
    <p class="sub">Logge dich in deinen Account ein.</p>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('schueler', this)">Ich bin Schüler</div>
      <div class="role-tab" onclick="setRole('firma', this)">Ich bin Arbeitgeber</div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green btn-full" style="margin-top:8px;">Einloggen</button>
    </form>

    <p class="auth-switch">Noch kein Account? <a href="register.html">Jetzt registrieren</a></p>
  </div>
</main>

<script type="module" src="js/auth.js"></script>
<script>
  function setRole(role, el) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('login-form').dataset.role = role;
  }
</script>
</body>
</html>
