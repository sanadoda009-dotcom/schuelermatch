<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/gate.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300c896'/%3E%3Cstop offset='1' stop-color='%232b2f8f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-weight='700' font-size='28' fill='white' text-anchor='middle'%3ESM%3C/text%3E%3C/svg%3E">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links"></div>
  <a href="register.html" class="btn btn-outline">Registrieren</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Willkommen zurück</h2>
    <p class="sub">Logge dich in deinen Account ein.</p>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('schueler', this)">Ich bin Schüler</div>
      <div class="role-tab" onclick="setRole('firma', this)">Ich bin Arbeitgeber</div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-green btn-full" style="margin-top:8px;">Einloggen</button>
    </form>

    <p class="auth-switch"><a href="forgot-password.html">Passwort vergessen?</a></p>
    <p class="auth-switch">Noch kein Account? <a href="register.html">Jetzt registrieren</a></p>
  </div>
</main>

<p style="text-align:center; padding-bottom:24px; font-size:0.8rem; color:var(--ink-soft);">
  <a href="impressum.html" style="color:inherit;">Impressum</a> · <a href="datenschutz.html" style="color:inherit;">Datenschutz</a>
</p>

<script type="module" src="js/auth.js"></script>
<script>
  function setRole(role, el) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('login-form').dataset.role = role;
  }
</script>
</body>
</html>
