<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort vergessen – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300c896'/%3E%3Cstop offset='1' stop-color='%232b2f8f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='43' font-family='Arial' font-weight='700' font-size='28' fill='white' text-anchor='middle'%3ESM%3C/text%3E%3C/svg%3E">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><span class="logo-mark">SM</span> SchülerMatch</a>
  <div class="nav-links"></div>
  <a href="login.html" class="btn btn-outline">Login</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Passwort vergessen</h2>
    <p class="sub">Wir schicken dir einen Link zum Zurücksetzen.</p>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
      </div>
      <button type="submit" class="btn btn-green btn-full">Link senden</button>
    </form>

    <p class="auth-switch">Zurück zum <a href="login.html">Login</a></p>
  </div>
</main>

<script type="module" src="js/forgot-password.js"></script>
</body>
</html>
