<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort vergessen – SchülerMatch</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/gate.js"></script>
<link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body class="auth-page">

<nav>
  <a href="index.html" class="logo"><img src="assets/logo.png" alt="SchülerMatch" class="logo-img"></a>
  <div class="nav-links"></div>
  <a href="login.html" class="btn btn-outline">Login</a>
</nav>
<script src="js/nav.js"></script>

<main class="auth-main">
  <div class="auth-box">
    <h2>Passwort vergessen</h2>
    <p class="sub">Wir schicken dir einen Link zum Zurücksetzen.</p>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" required>
      </div>
      <button type="submit" class="btn btn-green btn-full">Link senden</button>
    </form>

    <p class="auth-switch">Zurück zum <a href="login.html">Login</a></p>
  </div>
</main>

<script type="module" src="js/forgot-password.js"></script>
</body>
</html>
